<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Schedulizer{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .navbar-brand {
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .nav-link {
      margin-right: 10px;
    }

    .container-main {
      margin-top: 80px;
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body>

  <!-- ✅ NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand" href="{{ url_for('dashboard') }}">
        Schedulizer
      </a>

      <!-- Mobile toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar content -->
      <div class="collapse navbar-collapse" id="navbarContent">

        <!-- Left side -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
          </li>

          <!-- Tools Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              Tools
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{{ url_for('upload') }}">Upload CSV</a></li>
              <li><a class="dropdown-item" href="{{ url_for('teachers_page') }}">Teachers</a></li>
              <li><a class="dropdown-item" href="{{ url_for('periods') }}">Periods</a></li>
              <li><a class="dropdown-item" href="{{ url_for('absent_today') }}">Absences</a></li>
            </ul>
          </li>

        </ul>

        <!-- Right side -->
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="#">Settings</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-danger" href="{{ url_for('logout') }}">
              Logout
            </a>
          </li>

        </ul>

      </div>
    </div>
  </nav>

  <!-- ✅ MAIN CONTENT -->
  <div class="container container-main">
    {% block content %}
    {% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  {% block scripts %}{% endblock %}

</body>

</html>
